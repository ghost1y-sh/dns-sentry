apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: dns-sentry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/ghost1y-sh/dns-sentry:latest
          ports:
            - containerPort: 5000
          env:
            - name: VT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dns-sentry-secrets
                  key: VT_API_KEY
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: dns-sentry
spec:
  selector:
    app: web
  ports:
    - port: 5000
      targetPort: 5000
