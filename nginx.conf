limit_req_zone $binary_remote_addr zone=api:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=web:10m rate=30r/m;

server {
    listen 80;
    server_name dns-sentry.com www.dns-sentry.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dns-sentry.com www.dns-sentry.com;

    ssl_certificate /etc/letsencrypt/live/dns-sentry.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dns-sentry.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    proxy_read_timeout 120;
    proxy_connect_timeout 10;
    proxy_send_timeout 120;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/analyze {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/health {
        proxy_pass http://web:5000;
    }

    location / {
        limit_req zone=web burst=10 nodelay;

        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}