<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dns-sentry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #c0c0c0;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #00ff41;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .header p {
            color: #666;
            font-size: 0.85rem;
        }

        .input-section {
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            max-width: 600px;
            height: 120px;
            background: #111;
            border: 1px solid #333;
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            padding: 0.75rem;
            resize: vertical;
            appearance: none;
            -webkit-appearance: none;
            border-radius: 0;
        }

        textarea:focus {
            outline: none;
            border-color: #00ff41;
        }

        textarea::placeholder { color: #444; }

        button {
            display: block;
            margin-top: 0.75rem;
            padding: 0.75rem 2rem;
            background: #00ff41;
            color: #0a0a0a;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            border-radius: 0;
        }

        button:hover { background: #00cc33; }
        button:disabled { background: #333; color: #666; cursor: wait; }

        .progress-container {
            margin-bottom: 1.5rem;
            display: none;
        }

        .progress-text {
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: #00ff41;
        }

        .progress-bar-outer {
            width: 100%;
            max-width: 600px;
            height: 8px;
            background: #222;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #00ff41;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-bar-pulse {
            position: absolute;
            top: 0;
            left: -30%;
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.3), transparent);
            animation: pulse-slide 1.5s infinite;
        }

        @keyframes pulse-slide {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .progress-domain {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.3rem;
        }

        .summary {
            margin-bottom: 1.5rem;
            padding: 0.75rem;
            background: #111;
            border-left: 3px solid #00ff41;
            font-size: 0.85rem;
        }

        .result {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #111;
            border: 1px solid #222;
            overflow-x: hidden;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .domain-name {
            color: #fff;
            font-size: 1rem;
            word-break: break-all;
            min-width: 0;
        }

        .risk-badge {
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .risk-low { background: #1a3a1a; color: #00ff41; }
        .risk-medium { background: #3a3a1a; color: #ffff00; }
        .risk-high { background: #3a2a1a; color: #ff8800; }
        .risk-critical { background: #3a1a1a; color: #ff0000; }

        .score-bar {
            width: 100%;
            height: 4px;
            background: #222;
            margin-bottom: 0.75rem;
        }

        .score-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .check {
            font-size: 0.8rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid #1a1a1a;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .check:last-child { border-bottom: none; }

        .check-flag { color: #ff4444; }
        .check-ok { color: #00ff41; }

        .loading {
            color: #00ff41;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.25rem;
            }

            textarea {
                height: 100px;
                font-size: 16px;
            }

            .result {
                padding: 0.75rem;
            }

            .result-header {
                flex-direction: column;
                gap: 0.4rem;
            }

            .domain-name {
                font-size: 0.9rem;
            }

            .risk-badge {
                align-self: flex-start;
                font-size: 0.65rem;
            }

            .check {
                font-size: 0.75rem;
                line-height: 1.4;
            }

            .summary {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>> dns-sentry</h1>
        <p>DNS Suspicious Domain Analyzer</p>
    </div>

    <div class="input-section">
        <textarea id="domains" placeholder="Enter domains to analyze (one per line)&#10;&#10;example.com&#10;a3f9b2c1d4e5.evil.com&#10;totally-legit-login.xyz"></textarea>
        <button id="analyze" onclick="analyzeDomains()">Analyze</button>
    </div>

    <div class="progress-container" id="progress">
        <div class="progress-text" id="progress-text">> analyzing 0/0...</div>
        <div class="progress-bar-outer">
            <div class="progress-bar-fill" id="progress-fill"></div>
            <div class="progress-bar-pulse" id="progress-pulse"></div>
        </div>
        <div class="progress-domain" id="progress-domain"></div>
    </div>

    <div id="results"></div>

    <script>
        async function analyzeDomains() {
            const textarea = document.getElementById('domains');
            const button = document.getElementById('analyze');
            const resultsDiv = document.getElementById('results');
            const progressDiv = document.getElementById('progress');
            const progressText = document.getElementById('progress-text');
            const progressFill = document.getElementById('progress-fill');
            const progressPulse = document.getElementById('progress-pulse');
            const progressDomain = document.getElementById('progress-domain');

            const domains = textarea.value.trim().split('\n')
                .map(d => d.trim())
                .filter(d => d.length > 0);

            if (domains.length === 0) return;

            if (domains.length > 50) {
                resultsDiv.innerHTML = '<p style="color: #ff4444;">> error: maximum 50 domains per scan</p>';
                return;
            }

            button.disabled = true;
            button.textContent = 'Analyzing...';
            resultsDiv.innerHTML = '';
            progressDiv.style.display = 'block';
            progressFill.style.width = '0%';
            progressPulse.style.display = 'block';

            const allResults = [];
            let completed = 0;

            for (const domain of domains) {
                completed++;
                const pct = Math.round(((completed - 1) / domains.length) * 100);
                progressFill.style.width = pct + '%';
                progressText.textContent = `> analyzing ${completed}/${domains.length}...`;
                progressDomain.textContent = domain;

                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({domains: [domain]})
                    });

                    const data = await response.json();

                    if (!data.error && data.results) {
                        allResults.push(...data.results);
                        renderResults(allResults, resultsDiv);
                    }
                } catch (err) {
                    allResults.push({
                        domain: domain,
                        subdomain: domain.split('.')[0],
                        risk_score: 0,
                        risk_level: 'low',
                        checks: [{
                            name: 'Error',
                            score: 0,
                            flagged: false,
                            detail: 'Request failed: ' + err.message
                        }]
                    });
                    renderResults(allResults, resultsDiv);
                }
            }

            progressFill.style.width = '100%';
            progressText.textContent = `> scan complete: ${domains.length} domain(s) analyzed`;
            progressPulse.style.display = 'none';
            progressDomain.textContent = '';
            button.disabled = false;
            button.textContent = 'Analyze';
        }

        function renderResults(results, container) {
            const summary = {
                total: results.length,
                critical: results.filter(r => r.risk_level === 'critical').length,
                high: results.filter(r => r.risk_level === 'high').length,
                medium: results.filter(r => r.risk_level === 'medium').length,
                low: results.filter(r => r.risk_level === 'low').length,
            };

            let html = '';

            html += '<div class="summary">';
            html += `> ${summary.total} domain(s) scanned | `;
            html += `<span style="color:#ff0000">${summary.critical} critical</span> | `;
            html += `<span style="color:#ff8800">${summary.high} high</span> | `;
            html += `<span style="color:#ffff00">${summary.medium} medium</span> | `;
            html += `<span style="color:#00ff41">${summary.low} low</span>`;
            html += '</div>';

            for (const result of results) {
                const levelClass = 'risk-' + result.risk_level;
                const barColor = {
                    low: '#00ff41', medium: '#ffff00',
                    high: '#ff8800', critical: '#ff0000'
                }[result.risk_level];

                html += '<div class="result">';
                html += '<div class="result-header">';
                html += '<span class="domain-name">' + result.domain + '</span>';
                html += '<span class="risk-badge ' + levelClass + '">THREAT LEVEL: ' + result.risk_level.toUpperCase() + ' (' + result.risk_score + '/100)</span>';
                html += '</div>';
                html += '<div class="score-bar"><div class="score-fill" style="width:' + result.risk_score + '%;background:' + barColor + '"></div></div>';

                for (const check of result.checks) {
                    const cls = check.flagged ? 'check-flag' : 'check-ok';
                    const icon = check.flagged ? '!!' : 'OK';
                    html += '<div class="check"><span class="' + cls + '">[' + icon + ']</span> ' + check.name + ': ' + check.detail + '</div>';
                }

                html += '</div>';
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
